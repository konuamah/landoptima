services:
  db:
    image: postgis/postgis:16-3.4
    container_name: landoptima_db
    environment:
      POSTGRES_DB: landoptima
      POSTGRES_USER: landoptima
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./flask/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landoptima -d landoptima"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    build:
      context: .
      dockerfile: flask/Dockerfile.seed
    container_name: landoptima_seed
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://landoptima:password@db:5432/landoptima
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./flask:/app/flask
      - ./FILES/ghana_border:/app/ghana_border
    working_dir: /app
    command: python flask/db/seed.py

  flask:
    build:
      context: ./flask
      dockerfile: Dockerfile
    container_name: landoptima_flask
    environment:
      DATABASE_URL: postgresql://landoptima:password@db:5432/landoptima
    depends_on:
      - db
    ports:
      - "5000:5000"
    volumes:
      - ./flask/.env:/app/.env
      - ./FILES/ghana_adm1:/app/FILES/ghana_adm1

  seed-volta:
    build:
      context: .
      dockerfile: flask/Dockerfile.seed
    container_name: landoptima_seed_volta
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://landoptima:password@db:5432/landoptima
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./flask:/app/flask
      - ./FILES/ghana_adm1:/app/FILES/ghana_adm1
    working_dir: /app
    command: python -m flask.db.seed_volta --clip /app/FILES/ghana_adm1/volta_region.wkt

volumes:
  postgres_data:
